<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Avatar</title>
    <!-- Basic styling for a transparent, draggable companion window -->
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-end;
      }
    </style>
  </head>
  <body>
    <!-- The data-tauri-drag-region allows the user to drag the borderless window around -->
    <div id="root" data-tauri-drag-region></div>
    <script type="module" src="/web/avatar/main.tsx"></script>
  </body>
</html>
